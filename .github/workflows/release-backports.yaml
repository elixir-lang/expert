name: Release Expert - Backport

on:
  push:
    branches:
      - v[0-9]+\.[0-9]+

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config-backports.json

