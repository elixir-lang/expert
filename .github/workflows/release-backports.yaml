name: Release Expert - Backport

on:
  push:
    branches:
      - v[0-9]+\.[0-9]+

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config-backports.json

